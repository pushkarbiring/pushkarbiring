name: Generate GitHub Trophies

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate trophy
        run: |
          curl "https://github-profile-trophy.vercel.app/?username=pushkarbiring&theme=darkhub&no-frame=true&margin-w=10" -o trophy.svg

      - name: Commit trophy
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add trophy.svg
          git commit -m "Update trophy"
          git push
